<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Onze Dias Até o Céu — Painel da Tripulação</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1c1512">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Onze Dias">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>⚓ Onze Dias Até o Céu</h1>
    <div class="sub">Painel da Tripulação — D&D 5e</div>
    <svg class="ornamento" viewBox="0 0 240 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
      <line x1="14" y1="8" x2="104" y2="8"/><line x1="136" y1="8" x2="226" y2="8"/>
      <path d="M120 2 L126 8 L120 14 L114 8 Z" fill="currentColor" stroke="none"/>
      <circle cx="108" cy="8" r="2" fill="currentColor" stroke="none"/><circle cx="132" cy="8" r="2" fill="currentColor" stroke="none"/>
      <path d="M14 8 q-6 -5 -9 0 q3 3 9 0Z" fill="currentColor" stroke="none"/>
      <path d="M226 8 q6 -5 9 0 q-3 3 -9 0Z" fill="currentColor" stroke="none"/>
    </svg>
    <div class="status-bar"><span class="dot" id="dot"></span><span id="status">conectando…</span></div>
  </header>

  <div id="aviso-config"></div>
  <div id="identidade" class="card"></div>

  <div class="secao-titulo">Ordem de Iniciativa</div>
  <div id="iniciativa" class="card"></div>

  <div class="secao-titulo">Rolagem da Ficha</div>
  <div id="rolagem-ficha" class="card"></div>

  <div class="secao-titulo">Rolar Dados (livre)</div>
  <div class="card">
    <div class="rolador-topo">
      <input id="r_autor" placeholder="Quem rola? (seu nome)">
      <div class="vd">
        <button class="vd-btn ativo" data-vd="0" onclick="setVD(this)">Normal</button>
        <button class="vd-btn" data-vd="1" onclick="setVD(this)">Vantagem</button>
        <button class="vd-btn" data-vd="-1" onclick="setVD(this)">Desvant.</button>
      </div>
    </div>
    <div id="resultado" class="resultado">—</div>
    <div id="resultado-det" class="resultado-det"></div>
    <div class="dados">
      <button class="dado" onclick="rolarDado(20)">d20</button>
      <button class="dado" onclick="rolarDado(12)">d12</button>
      <button class="dado" onclick="rolarDado(10)">d10</button>
      <button class="dado" onclick="rolarDado(8)">d8</button>
      <button class="dado" onclick="rolarDado(6)">d6</button>
      <button class="dado" onclick="rolarDado(4)">d4</button>
      <button class="dado" onclick="rolarDado(100)">d%</button>
    </div>
    <div class="mod-linha">
      <span>Modificador (aplicado aos botões)</span>
      <button class="btn-pv" onclick="ajMod(-1)">−</button>
      <input id="r_mod" type="number" value="0">
      <button class="btn-pv" onclick="ajMod(1)">+</button>
    </div>
    <div class="formula-linha">
      <input id="r_formula" placeholder="Fórmula livre: 2d6+3" onkeydown="if(event.key==='Enter')rolarFormula()">
      <button class="btn btn-salvar" onclick="rolarFormula()">Rolar</button>
    </div>
  </div>

  <div class="secao-titulo">Rolagens Recentes</div>
  <div id="feed-rolagens"><div class="carregando">—</div></div>

  <div class="secao-titulo">Resumo da Tripulação</div>
  <div id="lista"><div class="carregando">Carregando…</div></div>

  <div id="versao" class="rodape"></div>

  <div id="banner-update" class="banner banner-update">
    <span class="banner-txt">Nova versão disponível.</span>
    <button class="banner-btn">Atualizar</button>
  </div>
  <div id="banner-install" class="banner">
    <span class="banner-txt">Instale o painel no seu celular.</span>
    <button class="banner-btn">Instalar</button>
    <button class="banner-x" aria-label="Fechar">✕</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/identidade.js"></script>
  <script src="js/brasoes.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
